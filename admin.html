<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم والأدمن - مكتب السفريات</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; margin-bottom: 5px; color: #94a3b8; font-weight: 600; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; border-radius: 8px; background: #151f32; 
            border: 1px solid #334155; color: #fff; font-size: 0.95rem;
        }
        .form-group input:focus, .form-group select:focus { border-color: #38bdf8; outline: none; }
        .submit-btn { 
            width: 100%; background: #38bdf8; color: #0f172a; border: none; 
            padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem;
        }
        .submit-btn:hover { background: #0ea5e9; }
        .delete-btn { background: #f43f5e; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .delete-btn:hover { background: #e11d48; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1>⚙️ لوحة إدارة الحجوزات والأدمن</h1>
            <p>إدخال التذاكر، تأشيرات العمرة، وإدارة النظام</p>
        </header>

        <!-- شريط التنقل المحدث ليشمل القسم الجديد -->
        <nav class="tabs-navigation">
            <button class="tab-btn active" onclick="switchTab('add-ticket-section')">🎟️ إضافة تذكرة</button>
            <button class="tab-btn" onclick="switchTab('add-umrah-section')">🕋 تأشيرات العمرة</button>
            <button class="tab-btn" onclick="switchTab('add-visa-section')">🛂 إضافة تأشيرة أخرى</button>
            <button class="tab-btn" onclick="switchTab('manage-section')">🛠️ إدارة النظام</button>
        </nav>

        <!-- 1️⃣ قسم إضافة تذكرة -->
        <section id="add-ticket-section" class="tab-content active-content">
            <form id="ticket-form">
                <div class="form-group">
                    <label>اسم صاحب التذكرة</label>
                    <input type="text" id="passenger_name" required placeholder="الاسم الكامل للمسافر">
                </div>
                <div class="form-group">
                    <label>رقم الحجز (PNR)</label>
                    <input type="text" id="booking_code" required placeholder="مثال: XZ98LL">
                </div>
                <div class="form-group">
                    <label>تاريخ ووقت الاقلاع</label>
                    <input type="datetime-local" id="departure_date" required>
                </div>
                <div class="form-group">
                    <label>من (مدينة الإقلاع)</label>
                    <input type="text" id="from_location" required placeholder="مثال: سيئون">
                </div>
                <div class="form-group">
                    <label>إلى (الوجهة)</label>
                    <input type="text" id="to_location" required placeholder="مثال: جدة">
                </div>
                <div class="form-group">
                    <label>تاريخ ووقت العودة (اتركه فارغاً إذا كان ذهاب فقط)</label>
                    <input type="datetime-local" id="return_date">
                </div>
                <div class="form-group">
                    <label>المصدر (مكان صدور التذكرة)</label>
                    <input type="text" id="source" required placeholder="مثال: مكتب سيئون الرئيسي / منصة B2B">
                </div>
                <div class="form-group">
                    <label>الجهة (الشركة الناقلة / الوكيل)</label>
                    <input type="text" id="destination_agency" required placeholder="مثال: اليمنية، فلاي عدن، العربية، أو شركات أخرى">
                </div>
                <button type="submit" class="submit-btn">💾 حفظ التذكرة في النظام</button>
            </form>
        </section>

        <!-- 2️⃣ قسم إضافة عمرة -->
        <section id="add-umrah-section" class="tab-content">
            <form id="umrah-form">
                <div class="form-group">
                    <label>اسم المعتمر</label>
                    <input type="text" id="pilgrim_name" required placeholder="الاسم الكامل للمعتمر">
                </div>
                <div class="form-group">
                    <label>تاريخ الدخول</label>
                    <input type="date" id="entry_date" required>
                </div>
                <div class="form-group">
                    <label>تاريخ الخروج</label>
                    <input type="date" id="exit_date" required>
                </div>
                <div class="form-group">
                    <label>النوع (وسيلة السفر)</label>
                    <select id="travel_type" required>
                        <option value="">-- اختر النوع --</option>
                        <option value="جو">جو ✈️</option>
                        <option value="بر">بر 🚌</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المصدر</label>
                    <input type="text" id="umrah_source" required placeholder="مصدر المعاملة">
                </div>
                <div class="form-group">
                    <label>المستفيد</label>
                    <input type="text" id="beneficiary" required placeholder="اسم الجهة المستفيدة">
                </div>
                <div class="form-group">
                    <label>الجهة التابع لها المعاملة</label>
                    <select id="agency_type" required>
                        <option value="">-- اختر الجهة --</option>
                        <option value="احرام">إحرام</option>
                        <option value="العمودي">العمودي</option>
                        <option value="سنابل الخير">سنابل الخير</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn" style="background: #10b981;">🕋 حفظ معاملة العمرة</button>
            </form>
        </section>

        <!-- 3️⃣ قسم إضافة تأشيرة جديدة (الجديد كلياً بالنموذج المطلوب) -->
        <section id="add-visa-section" class="tab-content">
            <form id="visa-form">
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" id="visa_name" required placeholder="الاسم الكامل للمتقدم">
                </div>
                <div class="form-group">
                    <label>تاريخ صلاحية التأشيرة</label>
                    <input type="date" id="visa_expiry_date" required>
                </div>
                <div class="form-group">
                    <label>نوع التأشيرة</label>
                    <select id="visa_type" required>
                        <option value="">-- اختر نوع التأشيرة --</option>
                        <option value="موافقة أمنية">موافقة أمنية 🛡️</option>
                        <option value="مرور عمان">مرور عمان 🇴🇲</option>
                        <option value="تأشيرات أخرى">تأشيرات أخرى 📄</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المصدر</label>
                    <input type="text" id="visa_source" required placeholder="جهة أو مكتب تصدير التأشيرة">
                </div>
                <div class="form-group">
                    <label>الوكيل</label>
                    <input type="text" id="visa_agent" required placeholder="اسم الوكيل المسؤول">
                </div>
                <button type="submit" class="submit-btn" style="background: #a855f7; color: #fff;">🛂 حفظ التأشيرة في النظام</button>
            </form>
        </section>

        <!-- 4️⃣ قسم إدارة وحذف البيانات الشامل -->
        <section id="manage-section" class="tab-content">
            <div class="table-holder full-width-table">
                <table id="admin-manage-table">
                    <thead>
                        <tr>
                            <th>الاسم / المستفيد</th>
                            <th>النوع / التصنيف</th>
                            <th>التاريخ / الجهة والوكيل</th>
                            <th>المصدر</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody><!-- يتحدث برمجياً من ملف admin.js --></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active-content'));
            document.querySelectorAll('.tabs-navigation .tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active-content');
            if(event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
        }
    </script>
    <script type="module" src="admin.js"></script>
</body>
</html>
