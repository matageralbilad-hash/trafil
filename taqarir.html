<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير الشهرية الشاملة - مكتب وفاء</title>
    <link rel="stylesheet" href="style.css">
    <!-- استدعاء مكتبة لتحويل التقرير إلى صورة بجودة عالية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* تصميم شبكة المجلدات الشهرية */
        .months-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .month-folder {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .month-folder::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 5px;
            background: #38bdf8;
        }
        .month-folder:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border-color: #38bdf8;
            background: #243249;
        }
        .folder-icon { font-size: 3rem; margin-bottom: 10px; }
        .folder-title { color: #f8fafc; font-size: 1.1rem; font-weight: bold; }
        
        /* نافذة التقرير المنبثقة الشاملة */
        .report-modal {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(5px); overflow-y: auto; padding: 20px;
        }
        .report-container {
            max-width: 900px; margin: 0 auto;
            background: #fff; /* خلفية بيضاء لتكون رسمية للطباعة والصورة */
            color: #0f172a; border-radius: 12px; padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        /* تنسيق البيانات داخل التقرير */
        .report-header { text-align: center; margin-bottom: 30px; border-bottom: 3px double #0f172a; padding-bottom: 20px; }
        .report-header h1 { font-size: 1.8rem; color: #0f172a; margin-bottom: 5px; }
        .report-header p { color: #475569; font-weight: bold; font-size: 1.1rem; }
        
        .stats-wrapper {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;
        }
        .stat-box {
            background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px;
            border-right: 4px solid #38bdf8;
        }
        .stat-box.highlight { border-right-color: #10b981; background: #ecfdf5; }
        .stat-box.warning { border-right-color: #f59e0b; background: #fffbeb; }
        .stat-box h4 { font-size: 0.9rem; color: #475569; margin-bottom: 8px; }
        .stat-box p { font-size: 1.4rem; font-weight: bold; color: #0f172a; }
        .stat-box span { font-size: 1rem; color: #10b981; }

        .report-actions {
            display: flex; justify-content: center; gap: 15px; margin-top: 30px;
        }
        .btn-report {
            padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold;
            font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .btn-close { background: #cbd5e1; color: #0f172a; }
        .btn-pdf { background: #38bdf8; color: #0f172a; }
        .btn-img { background: #10b981; color: #fff; }

        /* إخفاء الأزرار عند الطباعة */
        @media print {
            body * { visibility: hidden; }
            #printable-report, #printable-report * { visibility: visible; }
            #printable-report { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; box-shadow: none; }
            .report-actions { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div style="text-align: right;">
                <h1>📈 الأرشيف والإحصائيات الشهرية</h1>
                <p>اختر الشهر لاستخراج تقرير مفصل بصيغة PDF أو صورة</p>
            </div>
            <button class="back-btn" onclick="window.location.href='index.html'" style="padding: 10px 20px;">🔙 العودة للوحة</button>
        </header>

        <div id="loading-text" style="text-align: center; color: #38bdf8; font-size: 1.2rem; margin-top: 50px;">
            ⏳ جاري تحميل وفهرسة البيانات...
        </div>

        <!-- شبكة المجلدات ستتولد هنا برمجياً -->
        <div class="months-grid" id="months-grid"></div>
    </div>

    <!-- نافذة التقرير التفصيلي -->
    <div class="report-modal" id="reportModal">
        <div style="max-width: 900px; margin: 20px auto;">
            <!-- المنطقة التي سيتم تحويلها لـ PDF وصورة -->
            <div class="report-container" id="printable-report">
                <div class="report-header">
                    <h1>مكتب وفاء للسفريات والسياحة - سيئون</h1>
                    <p id="report-title">التقرير الإحصائي لشهر: جاري التحميل...</p>
                    <span style="font-size: 0.85rem; color: #64748b;" id="report-timestamp"></span>
                </div>

                <div class="stats-wrapper" id="report-content">
                    <!-- سيتم حقن الإحصائيات هنا -->
                </div>
            </div>

            <!-- أزرار الإجراءات -->
            <div class="report-actions">
                <button class="btn-report btn-close" onclick="closeReport()">❌ إغلاق</button>
                <button class="btn-report btn-pdf" onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
                <button class="btn-report btn-img" onclick="saveAsImage()">📸 حفظ كـ صورة</button>
            </div>
        </div>
    </div>

    <script type="module" src="taqarir.js"></script>
</body>
</html>
